name: Deploy to GCP (betteraisender.com)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  GCP_PROJECT:  ${{ secrets.GCP_PROJECT_ID }}
  GCP_ZONE:     ${{ secrets.GCP_ZONE || 'us-central1-a' }}
  VM_NAME:      ${{ secrets.GCP_VM_NAME || 'whatsapp-crm' }}
  DOMAIN:       betteraisender.com

jobs:
  # ─── Build check ────────────────────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }

      - name: Build backend
        working-directory: backend
        run: npm ci && npx prisma generate && npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          REACT_APP_API_URL=https://${{ env.DOMAIN }}/api \
          REACT_APP_WS_URL=https://${{ env.DOMAIN }} \
          SKIP_PREFLIGHT_CHECK=true \
          GENERATE_SOURCEMAP=false \
          npm run build

  # ─── Deploy via GCP SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ env.DOMAIN }}
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy via gcloud SSH
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="
              set -e
              echo '=== Deploying to ${{ env.DOMAIN }} ==='

              cd /opt/whatsapp-crm

              # Pull latest code
              git fetch origin main
              git reset --hard origin/main
              echo '✅ Code updated'

              # Update frontend env with production URLs
              cat > frontend/.env << 'EOF'
          REACT_APP_API_URL=https://${{ env.DOMAIN }}/api
          REACT_APP_WS_URL=https://${{ env.DOMAIN }}
          SKIP_PREFLIGHT_CHECK=true
          GENERATE_SOURCEMAP=false
          EOF

              # Rebuild images
              docker compose -f docker-compose.prod.yml --env-file deploy/.env.production \
                build --no-cache backend frontend
              echo '✅ Images rebuilt'

              # Run migrations
              docker compose -f docker-compose.prod.yml --env-file deploy/.env.production \
                run --rm backend npx prisma migrate deploy
              echo '✅ Migrations done'

              # Rolling update
              docker compose -f docker-compose.prod.yml --env-file deploy/.env.production \
                up -d --no-deps backend
              sleep 10
              docker compose -f docker-compose.prod.yml --env-file deploy/.env.production \
                up -d --no-deps frontend
              docker exec crm_nginx nginx -s reload 2>/dev/null || true
              echo '✅ Services updated'

              # Prune old images
              docker image prune -f --filter 'until=24h' 2>/dev/null || true
            " \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --quiet

      - name: Health check
        run: |
          sleep 20
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.DOMAIN }}/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ https://${{ env.DOMAIN }} is live!" && exit 0
            sleep 10
          done
          echo "⚠️ Health check did not return 200 — check server logs"
          exit 1
