name: Deploy to betteraisender.com

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  # ─── Build check ──────────────────────────────────────────────────────────
  build-check:
    name: TypeScript Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install & build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          REACT_APP_API_URL=https://betteraisender.com/api \
          REACT_APP_WS_URL=https://betteraisender.com \
          SKIP_PREFLIGHT_CHECK=true \
          GENERATE_SOURCEMAP=false \
          npm run build

  # ─── Deploy via SSH ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to betteraisender.com
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            echo "=== Deploying to betteraisender.com ==="

            cd /opt/whatsapp-crm

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code updated"

            # Rebuild frontend with production URLs
            cat > /opt/whatsapp-crm/frontend/.env << 'EOF'
            REACT_APP_API_URL=https://betteraisender.com/api
            REACT_APP_WS_URL=https://betteraisender.com
            SKIP_PREFLIGHT_CHECK=true
            GENERATE_SOURCEMAP=false
            EOF

            # Rebuild Docker images locally on the server
            docker compose -f docker-compose.server.yml --env-file deploy/.env.production \
              build --no-cache backend frontend
            echo "✅ Images built"

            # Run DB migrations
            docker compose -f docker-compose.server.yml --env-file deploy/.env.production \
              run --rm backend npx prisma migrate deploy
            echo "✅ Migrations done"

            # Zero-downtime rolling update
            docker compose -f docker-compose.server.yml --env-file deploy/.env.production \
              up -d --no-deps backend
            sleep 10
            docker compose -f docker-compose.server.yml --env-file deploy/.env.production \
              up -d --no-deps frontend
            docker exec crm_nginx nginx -s reload
            echo "✅ Services updated"

            # Cleanup old images
            docker image prune -f --filter "until=24h" 2>/dev/null || true

      - name: Verify deployment
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://betteraisender.com/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ betteraisender.com is live and healthy!"
          else
            echo "⚠️ Health check returned HTTP $STATUS — check server logs"
          fi
